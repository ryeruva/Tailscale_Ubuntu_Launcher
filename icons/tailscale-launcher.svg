<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2d3a" />
      <stop offset="100%" stop-color="#12131a" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Squircle Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg-grad)" stroke="#2b2d3a" stroke-width="2" />
  
  <!-- Mesh Lines -->
  <path d="M32,32 L32,14 M32,32 L47.58,23 M32,32 L47.58,41 M32,32 L32,50 M32,32 L16.42,41 M32,32 L16.42,23" stroke="#00c0a5" stroke-width="2" stroke-opacity="0.3" />
  <path d="M32,14 L47.58,23 L47.58,41 L32,50 L16.42,41 L16.42,23 Z" fill="none" stroke="#00c0a5" stroke-width="2" stroke-opacity="0.3" />
  
  <!-- Dots with slight glow -->
  <g filter="url(#glow)">
    <circle cx="32" cy="32" r="5.5" fill="#00c0a5" />
    <circle cx="32" cy="14" r="5.5" fill="#00c0a5" />
    <circle cx="47.58" cy="23" r="5.5" fill="#00c0a5" />
    <circle cx="47.58" cy="41" r="5.5" fill="#00c0a5" />
    <circle cx="32" cy="50" r="5.5" fill="#00c0a5" />
    <circle cx="16.42" cy="41" r="5.5" fill="#00c0a5" />
    <circle cx="16.42" cy="23" r="5.5" fill="#00c0a5" />
  </g>
</svg>
